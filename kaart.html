<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AED Kaart & Navigatie</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="manifest" href="manifest.json">

</head>
<body>

<nav class="top-nav">
    <div class="nav-left">
        <a href="quiz.html" class="btn-top btn-trainen">Trainen</a>
    </div>
    <img src="images/logo.png" alt="Noodhulp App Logo" class="app-logo">
    <div class="nav-right">
        <a href="tel:112" class="btn-top btn-112">📞 112</a>
        <button class="info-btn" onclick="alert('AED Kaart')">ℹ️</button>
    </div>
</nav>

<div id="map"></div>

<nav class="bottom-nav">
    <a href="index.html" class="btn-top nav-item">
        <span class="nav-icon">🏠</span>
        <span class="nav-text">Home</span>
    </a>
    <button class="icon-btn nav-item" onclick="toggleFlashlight()">
        <span class="nav-icon">🔦</span>
        <span class="nav-text" data-i18n="flashlight">Zaklamp</span>
    </button>
    <a href="kaart.html" class="btn-top nav-item">
        <span class="nav-icon">🗺️</span>
        <span class="nav-text" data-i18n="aedmap">AED Kaart</span>
    </a>
    <button class="icon-btn nav-item" onclick="toggleDarkMode()">
        <span class="nav-icon">🌓</span>
        <span class="nav-text" data-i18n="darkmode">Donker</span>
    </button>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // ----- FLASHLIGHT & DARK MODE -----
    let flashlightStream = null;
    let flashlightTrack = null;

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    }

    async function toggleFlashlight() {
        // Zelfde zaklamp code als eerder (weggehaald voor overzicht)
    }

    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
    }
    if (localStorage.getItem('flashlight') === 'true') {
        document.body.style.filter = 'invert(1)';
    }

    // ----- KAART & AEDs -----
    const map = L.map('map').setView([52.1326, 5.2913], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    async function fetchAEDs() {
        const bounds = map.getBounds();
        const query = `
            [out:json][timeout:25];
            node["emergency"="defibrillator"](${bounds.getSouth()},${bounds.getWest()},${bounds.getNorth()},${bounds.getEast()});
            out body;
        `;
        const url = 'https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(query);

        try {
            const response = await fetch(url);
            const data = await response.json();
            data.elements.forEach(aed => {
                L.marker([aed.lat, aed.lon])
                 .addTo(map)
                 .bindPopup(`<b>AED Gevonden</b><br>${aed.tags.description || "Geen extra info"}`);
            });
        } catch (e) { console.error("Data error", e); }
    }

    map.on('moveend', fetchAEDs);
    fetchAEDs();

    // ----- LOCATIE MARKER -----
    let userMarker = null;

    async function getReverseGeocode(lat, lon) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
            const data = await response.json();
            return data.address;
        } catch (error) {
            console.error('Reverse geocoding error:', error);
            return null;
        }
    }

    function requestLocationPermission() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                async function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    const statusEl = document.getElementById('location-status');
                    const detailsEl = document.getElementById('location-details');

                    statusEl.textContent = '✓ Locatie gevonden';
                    detailsEl.textContent = 'Adres ophalen...';

                    const address = await getReverseGeocode(lat, lon);
                    if (address) {
                        const street = address.road || address.footway || '';
                        const houseNumber = address.house_number || '';
                        const city = address.city || address.town || address.village || '';
                        let addressLine = street && houseNumber ? `${street} ${houseNumber}` : street;
                        detailsEl.innerHTML = `${addressLine}<br>${city}`;
                    } else {
                        detailsEl.textContent = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
                    }

                    // Marker op kaart
                    if (userMarker) {
                        userMarker.setLatLng([lat, lon]);
                    } else {
                        userMarker = L.marker([lat, lon], { title: "Jouw locatie" }).addTo(map);
                        userMarker.bindPopup("<b>Jouw locatie</b>").openPopup();
                    }

                    map.setView([lat, lon], 16);
                },
                function(error) {
                    alert('Locatie niet beschikbaar. Geef toestemming om je locatie te gebruiken.');
                },
                { enableHighAccuracy: true }
            );
        } else {
            alert('Geolocation wordt niet ondersteund door je browser.');
        }
    }

    // Maak status element aan
    const statusDiv = document.createElement('div');
    statusDiv.id = 'location-status';
    document.body.appendChild(statusDiv);

    const detailsDiv = document.createElement('div');
    detailsDiv.id = 'location-details';
    document.body.appendChild(detailsDiv);

    window.addEventListener('load', () => {
        requestLocationPermission();
    });
</script>

<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", function() {
        navigator.serviceWorker.register("service-worker.js");
    });
}
</script>
</body>
</html>
